    toast.id = 'copy-toast';
    toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#141b2d;border:1px solid rgba(61,133,255,.4);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:99999;box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:90vw;text-align:center;font-family:Inter,system-ui,sans-serif;transition:opacity .3s;pointer-events:none;opacity:0';

// Rebuild the liveData object the renderer expects from a stored analysis JSON.
function liveDataFromAI(aiJson) {
  return {
    fromAI: true,
    currentPrice: aiJson.currentPrice, companyName: aiJson.companyName, peRatio: aiJson.peRatio,
    marketCap: aiJson.marketCap, week52Low: aiJson.week52Low, week52High: aiJson.week52High,
    earningsDate: aiJson.earningsDate, analystPriceTarget: aiJson.analystPriceTarget, dividendYield: aiJson.dividendYield,
    analystBuy: aiJson.analystBuy, analystHold: aiJson.analystHold, analystSell: aiJson.analystSell,
    stockSentimentScore: aiJson.stockSentimentScore, sectorSentimentScore: aiJson.sectorSentimentScore,
    entrySignal: aiJson.entrySignal, sentimentAnalysis: aiJson.sentimentAnalysis
  };
}

async function loadSavedAnalyses() {
  if (!currentUser) { state.savedAnalyses = []; return; }
  try {
    const res = await fetch(`${BACKEND}/api/saved-analyses`, { headers: await authHeaders() });
    const json = await res.json();
    state.savedAnalyses = Array.isArray(json.savedAnalyses) ? json.savedAnalyses : [];
  } catch (e) {
    console.warn('Could not load saved analyses:', e);
    state.savedAnalyses = [];
  }
}

function showSaveCapModal() {
  state.pricingNote = 'Free accounts can save up to 2 analyses. Upgrade to Pro for unlimited.';
  state.watchlistOpen = false;
  state.pricingModal = true;
  render();
}

async function saveCurrentAnalysis() {
  if (!currentUser) { state.authModal = true; state.authMode = 'login'; render(); return; }
  const ticker = state.ticker;
  const ai = state.aiData[ticker];
  if (!ticker || !ai) return;
  const already = state.savedAnalyses.some(s => s.ticker === ticker);
  // Proactive free-tier cap — block a NEW ticker beyond the limit (overwrite is always fine)
  if (!already && state.savedAnalyses.length >= savedLimit()) { showSaveCapModal(); return; }
  state.savingAnalysis = true; render();
  try {
    const res = await fetch(`${BACKEND}/api/save-analysis`, {
      method: 'POST', headers: await authHeaders(),
      body: JSON.stringify({ ticker, analysis_data: ai })
    });
    if (res.status === 403) {
      const j = await res.json().catch(() => ({}));
      if (j.error === 'free_limit_reached') { state.savingAnalysis = false; showSaveCapModal(); return; }
    }
    if (!res.ok) throw new Error('save failed');
    await loadSavedAnalyses();
    state.viewingSavedDate = null; // this is now the live/fresh snapshot
    showCopyToast(already ? `Updated ${ticker} in your watchlist` : `Saved ${ticker} to your watchlist`);
  } catch (e) {
    console.warn('Save failed:', e);
    showCopyToast('Could not save right now. Please try again.');
  }
  state.savingAnalysis = false; render();
}

async function deleteSavedAnalysis(ticker) {
  try {
    const res = await fetch(`${BACKEND}/api/saved-analysis/${encodeURIComponent(ticker)}`, {
      method: 'DELETE', headers: await authHeaders()
    });
    if (!res.ok) throw new Error('delete failed');
    state.savedAnalyses = state.savedAnalyses.filter(s => s.ticker !== ticker);
    render();
  } catch (e) {
    console.warn('Delete failed:', e);
    showCopyToast('Could not remove right now. Please try again.');
  }
}

// ── Merge live data into stock object ───────────────────────
function mergeLiveData(stock, live) {
  if (!live) return stock;
  try {
    const currentPrice = live.currentPrice ?? stock.currentPrice;
    const companyName  = live.companyName  || stock.companyName;
    const peRatio      = live.peRatio      ?? stock.peRatio;
    const week52Low    = live.week52Low    ?? stock.week52Low;
    const week52High   = live.week52High   ?? stock.week52High;

    // Format market cap if it's a raw number, otherwise use as-is
    let marketCap = stock.marketCap;
    if (live.marketCap) {
      if (typeof live.marketCap === 'number') {
        const m = live.marketCap;
        marketCap = m >= 1e12 ? `$${(m/1e12).toFixed(2)}T`
                  : m >= 1e9  ? `$${(m/1e9).toFixed(0)}B`
                  : `$${(m/1e6).toFixed(0)}M`;
      } else {
        marketCap = live.marketCap;
      }
    }

    const mcapRaw = typeof live.marketCap === 'number' ? live.marketCap : null;
    const mcapLabel = mcapRaw
      ? (mcapRaw >= 2e11 ? "Mega Cap" : mcapRaw >= 1e10 ? "Large Cap" : mcapRaw >= 2e9 ? "Mid Cap" : "Small Cap")
      : stock.marketCapLabel;

    const peVal = parseFloat(peRatio);
    const peLabel = !isNaN(peVal) ? (peVal > 35 ? 'High' : peVal > 20 ? 'Fair' : 'Low') : '—';

    const pricePosition = week52High > week52Low && currentPrice
      ? Math.round(((currentPrice - week52Low) / (week52High - week52Low)) * 100)
      : stock.pricePosition;

    return { ...stock, currentPrice, companyName, peRatio, peLabel,
             marketCap, marketCapLabel: mcapLabel,
             week52Low, week52High, pricePosition,
             earningsDate:         live.earningsDate         || stock.earningsDate,
             analystPriceTarget:   live.analystPriceTarget   || stock.analystPriceTarget,
             dividendYield:        live.dividendYield        || stock.dividendYield,
             analystRating:        stock.analystRating,
             analystBuy:           live.analystBuy           ?? stock.analystBuy,
             analystHold:          live.analystHold          ?? stock.analystHold,
             analystSell:          live.analystSell          ?? stock.analystSell,
             stockSentimentScore:  live.stockSentimentScore  ?? stock.stockSentimentScore,
             sectorSentimentScore: live.sectorSentimentScore ?? stock.sectorSentimentScore,
             entrySignal:          live.entrySignal          || stock.entrySignal,
             sentimentAnalysis:    live.sentimentAnalysis    || stock.sentimentAnalysis,
             liveMomentum: stock.liveMomentum };
  } catch(e) {
    console.warn('mergeLiveData error:', e);
    return stock;
  }
}

function mergeAIData(stock, ai) {
  if (!ai) return stock;
  try {
    const models = ai.models || [];
    const gemini = models.find(m => m.model === 'Gemini' && !m.error);
    const gpt    = models.find(m => m.model === 'GPT-4o' && !m.error);
    const claude = models.find(m => m.model === 'Claude' && !m.error);
    const consensus = ai.consensus || {};

    // Build per-model scores for display
    const claudeScore = claude ? claude.bullScore : null;
    const gptScore    = gpt    ? gpt.bullScore    : null;
    const geminiScore = gemini ? gemini.bullScore : null;

    // Get best available text content (prefer Gemini since it's live)
    const best = gemini || gpt || claude;

  } catch(e) {

}

function getRiskAdjustment(riskProfile, riskTolerance) {
  if (riskTolerance === "conservative") {
    if (riskProfile <= 3) return +8;
    if (riskProfile <= 5) return +3;
    if (riskProfile <= 7) return -5;
    return -12;
  }
  if (riskTolerance === "aggressive") {
    if (riskProfile >= 8) return +10;
    if (riskProfile >= 6) return +5;
    if (riskProfile <= 3) return -4;
    return 0;
  }
  return 0;
}

function getRiskDescription(riskProfile, riskTolerance, ticker) {
  if (riskTolerance === "conservative") {
    if (riskProfile <= 3) return `${ticker} is a low-risk, stable stock — rewarded under conservative settings`;
    if (riskProfile <= 5) return `${ticker} has moderate risk — slight boost under conservative settings`;
    if (riskProfile <= 7) return `${ticker} carries higher risk — penalized under conservative settings`;
    return `${ticker} is a high-risk stock — significantly penalized under conservative settings`;
  }
  if (riskTolerance === "aggressive") {
    if (riskProfile >= 8) return `${ticker} is high-volatility with major upside — rewarded under aggressive settings`;
    if (riskProfile >= 6) return `${ticker} has solid upside potential — boosted under aggressive settings`;
    if (riskProfile <= 3) return `${ticker} is too stable for aggressive investors — slight downward adjustment`;
    return `${ticker} has moderate risk profile — neutral under aggressive settings`;
  }
  return "Balanced analysis — no adjustment applied";
}

function getConsensus(base, riskProfile, riskTolerance) {
  const adj = getRiskAdjustment(riskProfile, riskTolerance);
  const score = Math.min(99, Math.max(1, base + adj));
  const label = score >= 65 ? "CONFIDENT" : score >= 45 ? "NEUTRAL" : "CAUTIOUS";
  return {score, bull: score, bear: 100-score, label, adj};
}
function getVerdict(score) {
  if (score >= 85) return { text: "Strong Buy",  color: "#00c896", bg: "rgba(0,200,150,.12)" };
  if (score >= 70) return { text: "Bullish",      color: "#00c896", bg: "rgba(0,200,150,.10)" };
  if (score >= 55) return { text: "Lean Buy",     color: "#90ee90", bg: "rgba(144,238,144,.10)" };
  if (score >= 45) return { text: "Neutral",      color: "#94a3b8", bg: "rgba(148,163,184,.10)" };
  if (score >= 31) return { text: "Lean Sell",    color: "#ffd700", bg: "rgba(255,215,0,.10)" };
  if (score >= 16) return { text: "Bearish",      color: "#ff4757", bg: "rgba(255,71,87,.10)" };
  return               { text: "Strong Sell",  color: "#ff4757", bg: "rgba(255,71,87,.15)" };
}

// Actually re-run the Claude slot with the chosen model. Shows a loading state on
// the Claude card, then EITHER (success) swaps in the real result and lets gold
// reflect the backend's fableUsed flag, OR (failure/refusal/timeout) shows an
// error state — never gold, never the stale Haiku numbers.
async function runClaudeSwitch(useFableModel){
  const ticker = state.ticker;
  const ai = ticker && state.aiData[ticker];
  if (!ai) { render(); return; }
  state.claudeReanalyzing = true; state.claudeError = null; render();
  let timedOut = false;
  const to = setTimeout(() => { timedOut = true; }, 95000);
  try {
    const res = await fetch(`${BACKEND}/api/analyze-model`, {
      method: 'POST',
      headers: await authHeaders(),
      body: JSON.stringify({ ticker, model: 'claude', useFable: useFableModel })
    });
    const json = await res.json().catch(() => ({}));
    if (res.ok && !json.error) {
      const models = state.aiData[ticker].models || (state.aiData[ticker].models = []);
      const idx = models.findIndex(m => m.model === 'Claude');
      const prev = idx >= 0 ? models[idx] : {};
      const updated = {
        ...prev, model: 'Claude', error: undefined,
        bullScore: json.bullScore ?? prev.bullScore ?? 50,
        reasoning: json.reasoning ?? prev.reasoning,
        confidence: json.confidence ?? prev.confidence,
        bullScore1W: json.bullScore1W ?? prev.bullScore1W,
        bullScore1M: json.bullScore1M ?? prev.bullScore1M,
        bullScore1Y: json.bullScore1Y ?? prev.bullScore1Y
      };
      if (idx >= 0) models[idx] = updated; else models.push(updated);
      // Gold reflects ONLY what the backend actually did — if it fell back to Haiku
      // (cap hit mid-request) fableUsed is false and gold stays off.
      state.useFable = !!json.fableUsed;
      state.claudeModelName = json.claudeModel || (json.fableUsed ? 'Claude Fable 5' : 'Claude Haiku 4.5');
      state.fableRemaining = json.fableRemaining ?? state.fableRemaining;
      state.fableLimit = json.fableLimit ?? state.fableLimit;
      state.claudeError = null;
    } else {
      console.warn('Claude re-analysis failed:', json.error || res.status);
      state.claudeError = `${useFableModel ? 'Fable 5' : 'Haiku'} analysis failed. Tap to retry.`;
      if (useFableModel) state.useFable = false; // never gold on a failed Fable call
    }
  } catch (e) {
    console.warn('Claude re-analysis error:', e);
    state.claudeError = `${useFableModel ? 'Fable 5' : 'Haiku'} analysis ${timedOut ? 'timed out' : 'failed'}. Tap to retry.`;
    if (useFableModel) state.useFable = false;
  }
  clearTimeout(to);
  state.claudeReanalyzing = false;
  render();
}

function momentumSVG(score){
  const color=momentumColor(score);
  const toRad=a=>(a*Math.PI)/180;
  const angle=(score/100)*180;
  const nx=85+48*Math.cos(toRad(180+angle)),ny=90+48*Math.sin(toRad(180+angle));
  const arc=(s,e,r,cx,cy)=>{const x1=cx+r*Math.cos(toRad(s)),y1=cy+r*Math.sin(toRad(s)),x2=cx+r*Math.cos(toRad(e)),y2=cy+r*Math.sin(toRad(e));return`M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}`;};
  const segs=[{s:180,e:216,c:"#ff4757"},{s:216,e:252,c:"#ff8c42"},{s:252,e:288,c:"#ffd700"},{s:288,e:324,c:"#90ee90"},{s:324,e:360,c:"#00c896"}];
  return `<svg width="170" height="100" viewBox="0 0 170 100">
    ${segs.map(({s,e,c})=>`<path d="${arc(s,e,55,85,90)}" stroke="${c}" stroke-width="8" fill="none" stroke-linecap="butt" opacity=".3"/>`).join('')}
    <path d="${arc(180,180+angle,55,85,90)}" stroke="${color}" stroke-width="8" fill="none" stroke-linecap="round"/>
    <line x1="85" y1="90" x2="${nx}" y2="${ny}" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="85" cy="90" r="5" fill="white"/>
  </svg>`;
}

async function analyzeStock() {
  const ticker = state.searchInput.toUpperCase();
  if (!ticker) return;
  state.ticker = ticker;
  state.loading = true;
  state.viewingSavedDate = null;
  state.expandedReasoning = {};
  state.expandedBullItems = {};
  state.expandedBearItems = {};
  state.expandedNewsItems = {};
  state.usageError = null;
  state.xSent = null; state.xSentError = null; state.xSentLoading = false;
  state.claudeError = null; state.claudeReanalyzing = false;
  render();

  // Safety timeout — never stay stuck loading more than 45 seconds
  const loadingTimeout = setTimeout(() => {
    state.loading = false;
    render();
  }, 45000);

  try {
    // Build headers — always check the real session directly (not the currentUser variable,
    // which can still be null on page load even if a session exists, due to async init timing)
    const headers = { 'Content-Type': 'application/json' };
    const { data: { session } } = await sbClient.auth.getSession();
    if (session?.access_token) {
      headers['Authorization'] = `Bearer ${session.access_token}`;
    }

    const aiRes = await fetch(`${BACKEND}/api/analyze`, {
      method: 'POST',
      headers,
      body: JSON.stringify({ ticker, useFable: state.useFable && isPaid() })
    });

    if (aiRes.status === 429) {
      const errJson = await aiRes.json();
      state.usageError = errJson.message || "You've used all your free analyses for today.";
      state.usageRemaining = 0;
      state.ticker = ''; // don't show a half-loaded result for a blocked request
      clearTimeout(loadingTimeout);
      state.loading = false;
      render();
      return;
    }

    const aiJson = await aiRes.json();
    if (aiJson && !aiJson.error) {
      state.tier = aiJson.tier || 'free';
      state.usageRemaining = aiJson.usageRemaining ?? state.usageRemaining;
      state.claudeModelName = aiJson.claudeModel || 'Claude Haiku 4.5';
      // Gold reflects what the backend actually used for the Claude slot this run.
      if (aiJson.fableUsed !== undefined) state.useFable = !!aiJson.fableUsed;
      state.fableRemaining = aiJson.fableRemaining ?? state.fableRemaining;
      state.fableLimit = aiJson.fableLimit ?? state.fableLimit;
      state.claudeError = null;
      state.aiData[ticker] = aiJson;
      state.liveData[ticker] = liveDataFromAI(aiJson);
    }
  } catch(e) {
    console.warn('AI analysis failed:', e);
  }

  clearTimeout(loadingTimeout);
  state.loading = false;
  render();
}

async function analyzeXSentiment() {
  if (!isPaid()) { showPricingModal(); return; }
  const ticker = state.ticker;
  if (!ticker) return;
  state.xSentLoading = true; state.xSentError = null; render();
  try {
    const res = await fetch(`${BACKEND}/api/x-sentiment`, {
      method: 'POST', headers: await authHeaders(), body: JSON.stringify({ ticker })
    });
    const json = await res.json().catch(() => ({}));
    if (res.status === 403) { state.xSentLoading = false; showPricingModal(); return; }
    if (res.status === 429) {
      state.xSentError = json.message || "You've used all your X-Sentiment checks for today.";
      state.xSentRemaining = 0; state.xSentLoading = false; render(); return;
    }
    if (!res.ok || json.error) throw new Error(json.error || 'failed');
    const score = json.score ?? 50;
    state.xSent = { ticker, score, summary: json.summary || null,
      label: score >= 65 ? 'Bullish' : score <= 35 ? 'Bearish' : 'Mixed',
      color: score >= 65 ? '#00c896' : score <= 35 ? '#ff4757' : '#ffd700' };
    state.xSentRemaining = json.xSentRemaining ?? state.xSentRemaining;
  } catch (e) {
    console.warn('X-Sentiment failed:', e);
    state.xSentError = 'Could not fetch X-Sentiment right now. Please try again.';
  }
  state.xSentLoading = false; render();
}

  state.authError = '';
  try {
    if (state.authMode === 'login') {
      await signIn(state.authEmail, state.authPassword);
      state.authModal = false;
      state.authEmail = '';
      state.authPassword = '';
      await refreshProStatus();

      if (state.resumeCheckout) {
        state.resumeCheckout = false;
        render();
        await startCheckout(state.checkoutPlan);
        return;
      }

      render();
      // Re-run analysis on current ticker so Pro features reflect immediately, not on next manual search
      if (state.ticker) {
        state.searchInput = state.ticker;
        await analyzeStock();
      }
    } else {
      await signUp(state.authEmail, state.authPassword);
      state.authMode = 'verify';
      render();
    }
  } catch(e) {
    if (e.message && e.message.toLowerCase().includes('email not confirmed')) {
      state.authError = 'Please verify your email first — check your inbox for the confirmation link.';
    } else {
      state.authError = e.message || 'Something went wrong. Please try again.';
    }
    render();
  }
}

// ── Body-level tooltip (fixed positioning, never clipped by overflow) ──
(function(){
  var el = document.createElement('div');
  el.id = 'tt-tooltip';
  el.innerHTML = '<div id="tt-tooltip-title"></div><div id="tt-tooltip-body"></div>';
  document.body.appendChild(el);
})();

function showTip(btn) {
  var el = document.getElementById('tt-tooltip');
  var titleEl = document.getElementById('tt-tooltip-title');
  var bodyEl  = document.getElementById('tt-tooltip-body');
  titleEl.textContent = btn.dataset.tipTitle;
  bodyEl.textContent  = btn.dataset.tipText;
  el.classList.add('visible');
  positionTip(btn);
}

function positionTip(btn) {
  var el   = document.getElementById('tt-tooltip');
  var rect = btn.getBoundingClientRect();
  var tw   = el.offsetWidth;
  var th   = el.offsetHeight;
  var pad  = 8;

  var top  = rect.bottom + pad;
  var left = rect.left + rect.width / 2 - tw / 2;

  if (top + th > window.innerHeight - pad) {
    top = rect.top - th - pad;
  }
  if (left < pad) left = pad;
  if (left + tw > window.innerWidth - pad) left = window.innerWidth - tw - pad;

  el.style.top  = top  + 'px';
  el.style.left = left + 'px';
}

function hideTip() {
  document.getElementById('tt-tooltip').classList.remove('visible');
}

// Dismiss the info tooltip when tapping/clicking anywhere outside an info button (mobile tap-off).
// The info buttons rely on focus/blur, which never fires on a touch tap into empty space.
document.addEventListener('pointerdown', function(e){
  if (!(e.target && e.target.closest && e.target.closest('.info-btn'))) {
    hideTip();
    var a = document.activeElement;
    if (a && a.classList && a.classList.contains('info-btn')) a.blur();
  }
}, true);
</script>
